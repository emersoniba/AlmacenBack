services:
  - type: web
    name: almacen-backend
    runtime: python
    repo: https://https://github.com/emersoniba/AlmacenBack
    plan: free
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn almacen.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: almacen-backend.onrender.com,localhost
      - key: DATABASE_URL
        fromDatabase:
          name: almacen-db
          property: connectionString
      - key: DB_ENGINE_PROD
        value: django.db.backends.postgresql
      - key: CORS_ALLOWED_ORIGINS_PROD
        value: https://tu-frontend.onrender.com,https://almacen-backend.onrender.com

databases:
  - name: almacen-db
    databaseName: db.Almacen
    user: almacen_user
    plan: free
    region: oregon