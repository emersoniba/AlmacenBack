services:
  - type: web
    name: almacen-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: almacen-db
          property: connectionString

  - type: web
    name: almacen-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/front-almacen
    envVars:
      - key: API_URL
        value: https://almacen-backend.onrender.com

databases:
  - name: almacen-db
    databaseName: almacen_db
    user: postgres